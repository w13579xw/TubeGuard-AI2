# Benchmark configuration for SOTA comparison
# These configs are optimized for each method independently

methods:
  padim:
    backbone: resnet18
    batch_size: 32
    random_projection_dim: 550

  patchcore:
    backbone: wideresnet50
    batch_size: 32
    coreset_ratio: 0.01       # 1% of training features
    nearest_neighbors: 5

  autoencoder:
    latent_dim: 256
    epochs: 100
    lr: 1.0e-3
    batch_size: 16

  topovarad_stage1:
    checkpoint: checkpoints/stage1_best.pth
    batch_size: 1
