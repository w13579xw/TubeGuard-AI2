model:
  d_model: 256
  n_layers: 6
  n_heads: 8
  superpixel_scales: [50, 100, 200]
  rqvae_codebook_size: 1024
  rqvae_n_layers: 8
  rqvae_d_code: 32
  tar_n_layers: 6
  tar_n_heads: 8

train:
  stage1_epochs: 200
  stage2_epochs: 300
  batch_size: 4
  lr_stage1: 1.0e-4
  lr_stage2: 5.0e-5
  weight_decay: 0.05
  warmup_epochs: 10
  lambda_lpips: 0.1
  lambda_rqvae: 0.5
  lambda_ar: 1.0
  checkpoint_dir: checkpoints/

data:
  image_size: 512
  num_workers: 8
  dataset_path: data/mvtec
