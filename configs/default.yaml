model:
  d_model: 256
  n_layers: 6
  n_heads: 8
  dropout: 0.1
  superpixel_scales: [50, 100, 200]
  rqvae_codebook_size: 1024
  rqvae_n_layers: 8
  rqvae_d_code: 32
  tar_n_layers: 6
  tar_n_heads: 8

train:
  stage1_epochs: 100
  stage2_epochs: 150
  batch_size: 16
  lr_stage1: 1.0e-4
  lr_stage2: 1.0e-5  # 使用动态EMA decay和多样性损失后，可以使用稍高的学习率
  weight_decay: 0.05
  warmup_epochs: 10
  lambda_lpips: 0.1
  lambda_rqvae: 0.5
  lambda_ar: 1.0
  lambda_diversity: 0.01  # 码本多样性损失权重
  checkpoint_dir: checkpoints/
  log_dir: logs/
  augment: true
  use_sampler: true
  early_stopping: 20
  label_smoothing: 0.1

data:
  dataset_type: csv
  train_csv: ../data/train.csv
  test_csv: ../data/test.csv
  images_dir: ../data/images
  image_size: 512
  num_workers: 8