model:
  d_model: 256
  n_layers: 6
  n_heads: 8
  dropout: 0.1
  superpixel_scales: [50, 100, 200]
  rqvae_codebook_size: 1024
  rqvae_n_layers: 8
  rqvae_d_code: 32
  tar_n_layers: 6
  tar_n_heads: 8

train:
  stage1_epochs: 100
  stage2_epochs: 40  # ✅ Stage1 全程冻结后，只训 6M 参数，30-40 epoch 足够收敛
  batch_size: 32  # ✅ 24G 显存可跑更大 batch，加速训练
  lr_stage1: 1.0e-4
  lr_stage2: 2.0e-5  # ✅ 因为 batch 加倍，lr 也线性缩放（1e-5 → 2e-5）
  weight_decay: 0.05
  warmup_epochs: 5   # ✅ epoch 少了，warmup 也相应缩短
  lambda_lpips: 0.1
  lambda_rqvae: 0.5
  lambda_ar: 1.0
  lambda_diversity: 0.0  # 关闭多样性损失（副作用太大）
  checkpoint_dir: checkpoints/
  log_dir: logs/
  augment: true
  use_sampler: true
  early_stopping: 20
  label_smoothing: 0.1
  freeze_stage1_epochs: 10
  kmeans_init: true
  kmeans_init_batches: 50
  kmeans_iter: 10
  tar_warmup_epochs: 2  # ✅ epoch 少了，warmup 也缩短

data:
  dataset_type: csv
  train_csv: ../data/train.csv
  test_csv: ../data/test.csv
  images_dir: ../data/images
  image_size: 512
  num_workers: 12  # ✅ 加速数据加载，减少 GPU 等待