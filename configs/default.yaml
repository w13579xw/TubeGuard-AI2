model:
  d_model: 256
  n_layers: 6
  n_heads: 8
  dropout: 0.1
  superpixel_scales: [50, 100, 200]
  rqvae_codebook_size: 1024
  rqvae_n_layers: 8
  rqvae_d_code: 32
  tar_n_layers: 6
  tar_n_heads: 8

train:
  stage1_epochs: 100
  stage2_epochs: 30  # ✅ 加对比学习后收敛快，30 epoch 足够
  batch_size: 32  # ✅ 24G 显存可跑更大 batch，加速训练
  lr_stage1: 1.0e-4
  lr_stage2: 2.0e-5  # ✅ 因为 batch 加倍，lr 也线性缩放（1e-5 → 2e-5）
  weight_decay: 0.05
  warmup_epochs: 3   # ✅ epoch 少了，warmup 也相应缩短
  lambda_lpips: 0.1
  lambda_rqvae: 0.5
  lambda_ar: 0.5      # ✅ 降低 AR 权重（AR 不是主要目标）
  lambda_diversity: 0.0
  lambda_contrastive: 5.0  # ✅ 新增：弱监督对比学习权重
  contrastive_margin: 0.05  # ✅ 新增：正常 vs 异常的 rqvae_dist 应差 >= margin
  checkpoint_dir: checkpoints/
  log_dir: logs/
  augment: true
  use_sampler: true
  early_stopping: 20
  label_smoothing: 0.1
  freeze_stage1_epochs: 10
  kmeans_init: true
  kmeans_init_batches: 50
  kmeans_iter: 10
  tar_warmup_epochs: 2  # ✅ epoch 少了，warmup 也缩短

data:
  dataset_type: csv
  train_csv: ../data/train.csv
  test_csv: ../data/test.csv
  images_dir: ../data/images
  image_size: 512
  num_workers: 12  # ✅ 加速数据加载，减少 GPU 等待